name: Publish Docker Image

# Define quando essa ação vai rodar. Neste caso, toda vez que houver um push na branch 'main'
on:
  push:
    branches: ['master'] 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # ⚠️ MUITO IMPORTANTE: Essa permissão permite que o GitHub Actions escreva no GitHub Packages
    permissions:
      contents: read
      packages: write 

    steps:
      # 1. Baixa o código do seu repositório para a máquina virtual
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Faz o login no GitHub Container Registry (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Faz o build da imagem Docker e o push para o registro
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Altere 'meu-projeto' para o nome que você quer dar à imagem (DEVE SER EM LETRAS MINÚSCULAS)
          tags: ghcr.io/${{ github.repository_owner }}/gcalc_statics:latest
